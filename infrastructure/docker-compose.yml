version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: chatdock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ../backend
    env_file:
      - ../backend/.env
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"

  worker:
    build: ../backend
    command: celery -A app.workers.celery_worker.celery_app worker -l info -Q documents
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - backend

volumes:
  pg_data:
  qdrant_data:
